name: Mark Stale Issues and Pull Requests

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v8
        with:
          stale-issue-message: |
            This issue has been inactive for 30 days.
            If there's no further activity, it will be closed in 7 days.
            Please comment if you're still working on this.
          stale-pr-message: |
            This PR has been inactive for 30 days.
            If there's no further activity, it will be closed in 7 days.
            Please update if you're still working on this.
          close-issue-message: Closing due to inactivity.
          close-pr-message: Closing due to inactivity.
          days-before-issue-stale: 30
          days-before-pr-stale: 30
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,locked'
          exempt-pr-labels: 'pinned,locked'
